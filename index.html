<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C&T 生活小物 | 專業雲端商店</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg-color: #FFF9F5; --primary-color: #FF6B6B; --text-color: #4A3728; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: "PingFang TC", sans-serif; background-color: var(--bg-color); color: var(--text-color); overflow-x: hidden; }
        
        /* 🛠️ 導覽列：改為隨頁面滑動 */
        nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 5%; 
            background: rgba(255,255,255,0.95); 
            position: absolute; /* 隨網頁滑動 */
            width: 100%; 
            z-index: 1000; 
            height: 60px; 
            box-shadow: 0 1px 10px rgba(0,0,0,0.05); 
        }
        
        .logo { font-size: 1.4rem; font-weight: bold; color: var(--primary-color); letter-spacing: 2px; cursor: pointer; }

        /* 🛠️ 重點修改：讓購物車圖示「獨立」固定在右上角 */
        .cart-fixed-trigger {
            position: fixed; /* 固定不動 */
            top: 15px;
            right: 5%;
            z-index: 1500; /* 層級最高，確保不被擋住 */
            background: var(--white);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            color: var(--text-color);
        }
        
        .cart-count { 
            position: absolute; 
            top: -5px; 
            right: -5px; 
            background: var(--primary-color); 
            color: white; 
            border-radius: 50%; 
            width: 18px; 
            height: 18px; 
            font-size: 10px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        /* 購物車側邊欄 - 保持固定 */
        #cartSidebar { position: fixed; right: -100%; top: 0; width: 85%; max-width: 320px; height: 100%; background: var(--white); z-index: 2000; transition: 0.4s; padding: 25px; overflow-y: auto; box-shadow: -5px 0 15px rgba(0,0,0,0.1); }
        #cartSidebar.active { right: 0; }
