<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C&T 生活小物 | 專業雲端商店</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { 
            --bg-color: #FFF9F5; 
            --primary-color: #FF6B6B; 
            --text-color: #4A3728; 
            --white: #ffffff; 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            line-height: 1.6;
        }

        /* 導覽列 */
        nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 5%; 
            background: var(--white); 
            position: sticky; 
            top: 0;
            width: 100%; 
            height: 60px; 
            z-index: 1000;
            box-shadow: 0 1px 5px rgba(0,0,0,0.05);
        }

        .logo { font-size: 1.1rem; font-weight: bold; color: var(--primary-color); cursor: pointer; }

        .cart-icon { position: relative; cursor: pointer; font-size: 1.2rem; }
        .cart-count { 
            position: absolute; top: -8px; right: -8px; 
            background: var(--primary-color); color: white; 
            border-radius: 50%; width: 18px; height: 18px; 
            font-size: 10px; display: flex; align-items: center; justify-content: center; 
        }

        /* 購物車側邊欄 */
        #cartSidebar { 
            position: fixed; right: -100%; top: 0; 
            width: 85%; max-width: 320px; height: 100vh; 
            background: var(--white); z-index: 2000; 
            transition: 0.3s ease-in-out; 
            box-shadow: -5px 0 15px rgba(0,0,0,0.1); 
            display: flex; 
            flex-direction: column;
        }
        #cartSidebar.active { right: 0; }

        .cart-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        #cartItemsList { flex-grow: 1; overflow-y: auto; padding: 15px 20px; }
        .cart-footer { padding: 20px; border-top: 1px solid #eee; background: #fff; }

        /* 商品網格優化：修正排版跑掉的問題 */
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            padding: 15px; 
        }
        .product-card { 
            background: white; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid #f0f0f0; 
            display: flex; 
            flex-direction: column;
            transition: transform 0.2s;
        }
        .product-img { 
            width: 100%; 
            aspect-ratio: 1 / 1; 
            background-size: cover; 
            background-position: center; 
            background-color: #f9f9f9;
        }
        .product-info { 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            flex-grow: 1;
        }
        .product-name {
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 1; /* 限制品名一行 */
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .product-desc {
            font-size: 0.75rem;
            color: #888;
            height: 2.4em; /* 固定兩行描述的高度 */
            display: -webkit-box;
            -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.2;
            margin-bottom: 8px;
        }
        .product-price { color: var(--primary-color); font-weight: bold; font-size: 1rem; margin-bottom: 8px; }

        .btn-main { width: 100%; padding: 12px; background: var(--primary-color); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        .btn-add { padding: 8px; font-size: 0.8rem; margin: 0; }

        /* 結帳頁面 */
        #checkout-site { display: none; padding: 20px 5%; }
        .checkout-container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; -webkit-appearance: none; }

        .notice-box { margin-top: 12px; padding: 10px; background: #FFF5F5; border: 1px solid #FFE3E3; border-radius: 8px; font-size: 0.75rem; color: #E66767; text-align: center; }

        @media (min-width: 768px) {
            .product-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 30px 5%; }
            .product-name { font-size: 1rem; -webkit-line-clamp: 2; height: 2.8em; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="goHome()">C&T生活小物</div>
        <div class="cart-icon" onclick="toggleCart()">
            <i class="fa-solid fa-basket-shopping"></i>
            <span class="cart-count" id="cartCount">0</span>
        </div>
    </nav>

    <div id="cartSidebar">
        <div class="cart-header">
            <h3>購物清單</h3>
            <span onclick="toggleCart()" style="cursor:pointer; font-size:1.5rem;">&times;</span>
        </div>
        <div id="cartItemsList"></div>
        <div id="cartFooterWrap" class="cart-footer" style="display: none;">
            <button class="btn-main" onclick="startCheckout()">立即結帳</button>
        </div>
    </div>

    <main id="main-site">
        <header style="height: 25vh; background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('https://images.unsplash.com/photo-1513519245088-0e12902e5a38?auto=format&fit=crop&w=800&q=60'); background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white;">
            <h1 style="letter-spacing: 2px;">質感生活小鋪</h1>
            <p style="font-size: 0.9rem; opacity: 0.9;">選物 ・ 溫度 ・ 日常</p>
        </header>
        <div class="product-grid" id="productGrid">
            <p style="grid-column: 1/-1; text-align: center; padding: 50px; color: #999;">商品載入中...</p>
        </div>
    </main>

    <section id="checkout-site">
        <div class="checkout-container">
            <h3 style="text-align:center; margin-bottom:20px;">填寫配送資料</h3>
            <div id="checkoutSummary" style="background:#fffcf9; padding:15px; border-radius:10px; border:1px dashed #ffd8d8; margin-bottom:20px;"></div>
            
            <input type="text" id="custName" placeholder="收件人姓名">
            <input type="tel" id="custPhone" placeholder="收件人電話">
            <input type="text" id="custLine" placeholder="LINE ID (必填，小編聯絡用)">
            <input type="text" id="custAddr" placeholder="完整配送地址 / 店到店資訊">
            
            <button class="btn-main" id="submitBtn" onclick="processOrder()">確認送出訂單</button>
            <p onclick="goHome()" style="text-align:center; margin-top:20px; color:#aaa; cursor:pointer; font-size:0.85rem; text-decoration: underline;">回商店繼續逛逛</p>
            
            <div class="notice-box">
                <strong><i class="fa-solid fa-circle-info"></i> 訂購須知：</strong><br>
                點擊確認後訂單即成立，小編會盡快聯絡您支付與出貨細節。
            </div>
        </div>
    </section>

    <form id="ecpayForm" method="POST" action="" style="display:none;"></form>

    <script>
        // 設定與 GAS 連動
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxMtgajW5rrXPR7DbbNLnwDD_Wfg717BC_f9g3R6Hh5xA2Mlv6MebBOHJgjZHHFZMdp/exec";
        
        // 【功能開關】如果您想開啟刷卡跳轉，請將 false 改為 true
        const useEcPay = false; 

        let cart = {};

        // 1. 取得商品 (對應 品名/價格/描述/圖案)
        async function fetchProducts() {
            try {
                const res = await fetch(GOOGLE_SCRIPT_URL);
                const data = await res.json();
                const grid = document.getElementById('productGrid');
                
                if (data.length > 0) {
                    grid.innerHTML = data.map(p => `
                        <div class="product-card">
                            <div class="product-img" style="background-image: url('${p.ImgUrl || ''}')"></div>
                            <div class="product-info">
                                <div>
                                    <div class="product-name">${p.Name}</div>
                                    <div class="product-desc">${p.Description || ''}</div>
                                </div>
                                <div>
                                    <div class="product-price">NT$ ${p.Price}</div>
                                    <button class="btn-main btn-add" onclick="addToCart('${p.Name.replace(/'/g, "\\'")}', ${p.Price})">加入購物車</button>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (err) {
                document.getElementById('productGrid').innerHTML = "<p style='text-align:center; padding:50px;'>暫時無法讀取商品，請檢查網路</p>";
            }
        }

        // 2. 購物車邏輯
        function addToCart(name, price) {
            if (cart[name]) { cart[name].qty++; } else { cart[name] = { price, qty: 1 }; }
            updateUI();
            if (!document.getElementById('cartSidebar').classList.contains('active')) toggleCart();
        }

        function updateQty(name, delta) {
            cart[name].qty += delta;
            if (cart[name].qty <= 0) delete cart[name];
            updateUI();
            if (document.getElementById('checkout-site').style.display === "block") startCheckout();
        }

        function updateUI() {
            const list = document.getElementById('cartItemsList');
            let totalQty = 0; let html = "";
            for (let name in cart) {
                totalQty += cart[name].qty;
                html += `
                    <div style="border-bottom:1px solid #f5f5f5; padding:12px 0;">
                        <div style="display:flex; justify-content:space-between; font-size:0.9rem;">
                            <strong>${name}</strong>
                            <span style="color:var(--primary-color); font-weight:bold;">$${cart[name].price * cart[name].qty}</span>
                        </div>
                        <div style="display:flex; align-items:center; gap:10px; margin-top:8px;">
                            <button onclick="updateQty('${name}', -1)" style="width:25px; height:25px; border:1px solid #ddd; background:#fff; border-radius:4px;">-</button>
                            <span>${cart[name].qty}</span>
                            <button onclick="updateQty('${name}', 1)" style="width:25px; height:25px; border:1px solid #ddd; background:#fff; border-radius:4px;">+</button>
                        </div>
                    </div>`;
            }
            list.innerHTML = html || "<p style='text-align:center; padding:30px; color:#ccc;'>購物車是空的</p>";
            document.getElementById('cartCount').innerText = totalQty;
            document.getElementById('cartFooterWrap').style.display = totalQty > 0 ? "block" : "none";
        }

        function toggleCart() { document.getElementById('cartSidebar').classList.toggle('active'); }
        function goHome() { document.getElementById('main-site').style.display="block"; document.getElementById('checkout-site').style.display="none"; window.scrollTo(0,0); }

        function startCheckout() {
            document.getElementById('main-site').style.display = "none";
            document.getElementById('checkout-site').style.display = "block";
            let total = 0; let html = "";
            for (let name in cart) {
                let sub = cart[name].price * cart[name].qty; total += sub;
                html += `<div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:0.85rem;"><span>${name} x ${cart[name].qty}</span><span>$${sub}</span></div>`;
            }
            document.getElementById('checkoutSummary').innerHTML = html + `<div style='text-align:right; font-weight:bold; color:var(--primary-color); border-top:1px solid #eee; padding-top:10px; margin-top:10px;'>總計: NT$ ${total}</div>`;
            if (document.getElementById('cartSidebar').classList.contains('active')) toggleCart();
            window.scrollTo(0,0);
        }

        // 3. 送出訂單處理
        async function processOrder() {
            const name = document.getElementById('custName').value.trim();
            const phone = document.getElementById('custPhone').value.trim();
            const line = document.getElementById('custLine').value.trim();
            const addr = document.getElementById('custAddr').value.trim();

            if (!name || !phone || !line || !addr) return alert("請完整填寫收件與 LINE 聯絡資訊！");

            const btn = document.getElementById('submitBtn');
            btn.innerText = "訂單傳送中..."; btn.disabled = true;

            const orderData = {
                action: useEcPay ? "createPayment" : "submitOnly",
                customerName: name,
                customerPhone: phone,
                customerLine: line,
                address: addr,
                items: Object.keys(cart).map(k => `${k}(x${cart[k].qty})`).join(', '),
                totalAmount: Object.values(cart).reduce((s, v) => s + (v.price * v.qty), 0)
            };

            try {
                // 發送到 GAS (後端會同時紀錄到試算表並發送 LINE 通知)
                // 註：因為 no-cors 限制，我們無法在前端直接讀取 GAS 回傳的 JSON。
                // 如果要刷卡，GAS 必須回傳一個帶有金流參數的 HTML，或我們改用其他傳輸方式。
                // 這裡目前設定為「隱藏綠界」，所以直接執行成功通知。
                
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors", 
                    body: JSON.stringify(orderData)
                });

                // 如果未來想「啟用」綠界，這裡會需要一個中間頁面處理跳轉
                // 目前採用您的「隱藏模式」：直接顯示下單完成。
                alert("訂單已傳送成功！小編會盡快聯絡您。");
                cart = {}; updateUI(); goHome();
                
            } catch (e) {
                alert("下單失敗，請檢查網路連線。");
            } finally {
                btn.innerText = "確認送出訂單"; btn.disabled = false;
            }
        }

        // 初始化
        fetchProducts();
    </script>
</body>
</html>
