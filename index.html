<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C&T 生活小物 | 專業雲端商店</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { 
            --bg-color: #FFF9F5;       /* 溫暖底色 */
            --primary-color: #FF6B6B;  /* 熱情珊瑚紅 */
            --text-color: #4A3728; 
            --white: #ffffff; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: "PingFang TC", sans-serif; background-color: var(--bg-color); color: var(--text-color); overflow-x: hidden; }
        
        /* 導覽列：保持簡潔 */
        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 5%; background: rgba(255,255,255,0.95); 
            position: fixed; width: 100%; z-index: 1000; height: 60px; 
            backdrop-filter: blur(10px); box-shadow: 0 1px 10px rgba(0,0,0,0.05); 
        }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--primary-color); letter-spacing: 2px; cursor: pointer; }
        .cart-icon { position: relative; cursor: pointer; font-size: 1.2rem; }
        .cart-count { position: absolute; top: -8px; right: -8px; background: var(--primary-color); color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center; }
        
        /* 購物車側邊欄 */
        #cartSidebar { position: fixed; right: -100%; top: 0; width: 85%; max-width: 320px; height: 100%; background: var(--white); z-index: 2000; transition: 0.4s; padding: 25px; overflow-y: auto; box-shadow: -5px 0 15px rgba(0,0,0,0.1); }
        #cartSidebar.active { right: 0; }
        
        /* Hero 區塊：標題搬移至此，隨滾動消失 */
        .hero { 
            height: 40vh; 
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1513519245088-0e12902e5a38?auto=format&fit=crop&w=1200&q=80'); 
            background-size: cover; background-position: center; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: white; text-align: center; margin-top: 60px; padding: 0 20px;
        }
        .hero h2 { font-size: 1.2rem; color: #FFD93D; margin-bottom: 10px; letter-spacing: 2px; }
        .hero h1 { font-size: 2.2rem; letter-spacing: 5px; margin-bottom: 5px; }
        
        /* 商品網格 */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 20px 4%; }
        .product-card { background: white; border-radius: 10px; overflow: hidden; border: 1px solid #f0f0f0; display: flex; flex-direction: column; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .product-img { width: 100%; aspect-ratio: 1/1; background-size: cover; background-position: center; }
        .product-info { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
